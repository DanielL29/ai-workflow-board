name: Deploy Infra (Terraform)

on:
  push:
    paths:
      - 'infra/**'

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
      - name: Terraform Init
        run: |
          cd infra/terraform
          terraform init
      - name: Terraform Plan
        run: |
          cd infra/terraform
          terraform plan -out=tfplan
